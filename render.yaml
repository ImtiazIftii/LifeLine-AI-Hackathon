services:
  - type: web
    name: lifeline-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: true
      - key: CORS_ORIGINS
        sync: false
      - key: ALLOW_VERCEL_PREVIEWS
        value: false
      - key: ALLOW_DEMO_ROLE_HEADER
        value: false
      - key: ENABLE_DEMO_ACCOUNTS
        value: false
      - key: ALLOW_PRIVILEGED_SELF_REGISTRATION
        value: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DOCS_ADMIN_EMAIL
        value: admin@lifeline.demo
      - key: DOCS_ADMIN_PASSWORD
        generateValue: true
      - key: DOCS_SUPER_ADMIN_EMAIL
        sync: false
      - key: DOCS_SUPER_ADMIN_PASSWORD
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
