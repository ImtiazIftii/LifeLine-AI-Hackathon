services:
  - type: web
    name: lifeline-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci --omit=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: true
      - key: CORS_ORIGINS
        sync: false
      - key: ALLOW_VERCEL_PREVIEWS
        value: false
      - key: ALLOW_DEMO_ROLE_HEADER
        value: false
      - key: ENABLE_DEMO_ACCOUNTS
        value: false
      - key: ALLOW_PRIVILEGED_SELF_REGISTRATION
        value: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DOCS_ADMIN_EMAIL
        value: admin@lifeline.demo
      - key: DOCS_ADMIN_PASSWORD
        generateValue: true
      - key: DOCS_SUPER_ADMIN_EMAIL
        sync: false
      - key: DOCS_SUPER_ADMIN_PASSWORD
        sync: false
      - key: LLM_PROVIDER
        value: mock
