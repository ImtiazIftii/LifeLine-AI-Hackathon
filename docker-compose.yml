services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lifeline}
      POSTGRES_USER: ${POSTGRES_USER:-lifeline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lifeline_demo_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lifeline} -d ${POSTGRES_DB:-lifeline}"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-lifeline_graph_password}
      NEO4J_PLUGINS: '[]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:7474 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://lifeline:lifeline_demo_password@postgres:5432/lifeline}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-lifeline_graph_password}
      JWT_SECRET: ${JWT_SECRET:-change-this-demo-secret}
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ALLOW_DEMO_ROLE_HEADER: ${ALLOW_DEMO_ROLE_HEADER:-true}
      ENABLE_DEMO_ACCOUNTS: ${ENABLE_DEMO_ACCOUNTS:-true}
      ALLOW_PRIVILEGED_SELF_REGISTRATION: ${ALLOW_PRIVILEGED_SELF_REGISTRATION:-true}
      DOCS_ADMIN_EMAIL: ${DOCS_ADMIN_EMAIL:-admin@lifeline.demo}
      DOCS_ADMIN_PASSWORD: ${DOCS_ADMIN_PASSWORD:-Demo123!}
      DOCS_SUPER_ADMIN_EMAIL: ${DOCS_SUPER_ADMIN_EMAIL:-superadmin@lifeline.demo}
      DOCS_SUPER_ADMIN_PASSWORD: ${DOCS_SUPER_ADMIN_PASSWORD:-Demo123!}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:8000}
      LLM_MODEL: ${LLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_ENABLE_DEMO_ROLE_HEADER: ${NEXT_PUBLIC_ENABLE_DEMO_ROLE_HEADER:-true}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_ENABLE_DEMO_ROLE_HEADER: ${NEXT_PUBLIC_ENABLE_DEMO_ROLE_HEADER:-true}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  neo4j_data:
